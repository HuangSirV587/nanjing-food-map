const districtColors = {"秦淮区": "#e11d48", "建邺区": "#2563eb", "鼓楼区": "#f59e0b", "浦口区": "#16a34a", "江宁区": "#7c3aed", "玄武区": "#0891b2", "雨花台区": "#dc2626", "未识别": "#6b7280"};
const map = new BMap.Map('map', {enableMapClick:false});
map.centerAndZoom(new BMap.Point(118.7969,32.0603), 11);
map.enableScrollWheelZoom(true);
map.setMapStyleV2({styleId: 'dark'});
map.addControl(new BMap.NavigationControl());
map.addControl(new BMap.ScaleControl());
const points = [];
const markerRegistry = new Map();
let activePulse = null;

function buildInfoHtml(item) {
  return `<div style="min-width:320px;font-family:Microsoft YaHei"><div style="font-size:18px;font-weight:800;margin-bottom:6px">${item.district} ${item.district_seq}. ${item.name}</div><div style="color:#374151;line-height:1.7">类别：${item.category}<br>地址：${item.address}<br>特色菜：${item.feature || '-'}<br>人均：${item.price || '-'} </div></div>`;
}

function highlightList(key, scroll=true) {
  document.querySelectorAll('.restaurant-item.active').forEach(el => el.classList.remove('active'));
  const current = document.querySelector(`.restaurant-item[data-key="${key}"]`);
  if (current) {
    current.classList.add('active');
    if (scroll) current.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

function pulse(point, color) {
  if (activePulse) map.removeOverlay(activePulse);
  activePulse = new BMap.Circle(point, 140, {strokeColor:'#f8fafc', fillColor: color || '#6b7280', fillOpacity:0.16, strokeWeight:3, strokeOpacity:0.95});
  map.addOverlay(activePulse);
}

function openEntry(key, scrollList=false) {
  const entry = markerRegistry.get(key);
  if (!entry) return;
  const {item, point} = entry;
  const infoWindow = new BMap.InfoWindow(buildInfoHtml(item), {width:360});
  map.openInfoWindow(infoWindow, point);
  pulse(point, districtColors[item.district]);
  highlightList(key, scrollList);
}

function jumpToMapAnchor() {
  const anchor = document.getElementById('map-anchor');
  const topSection = document.querySelector('.top');
  const targetEl = anchor || topSection || document.getElementById('map');
  if (!targetEl) return;
  const absoluteTop = Math.max((targetEl.getBoundingClientRect().top + window.pageYOffset - 8), 0);
  try { targetEl.scrollIntoView({behavior:'auto', block:'start'}); } catch (e) {}
  window.scrollTo(0, absoluteTop);
  document.documentElement.scrollTop = absoluteTop;
  document.body.scrollTop = absoluteTop;
  window.setTimeout(() => {
    window.scrollTo(0, absoluteTop);
    document.documentElement.scrollTop = absoluteTop;
    document.body.scrollTop = absoluteTop;
  }, 80);
}

function focusRestaurant(key, zoom=15) {
  const entry = markerRegistry.get(key);
  if (!entry) return;
  jumpToMapAnchor();
  window.setTimeout(() => {
    map.centerAndZoom(entry.point, zoom);
    window.setTimeout(() => {
      map.panTo(entry.point);
      openEntry(key, false);
      window.setTimeout(() => map.panTo(entry.point), 80);
    }, 220);
  }, 60);
}

for (const item of items) {
  const p = new BMap.Point(item.geo.lng, item.geo.lat);
  points.push(p);
  const color = districtColors[item.district] || '#6b7280';
  const key = item.map_key;
  const label = new BMap.Label(String(item.district_seq), {position:p, offset:new BMap.Size(0,0)});
  label.setStyle({
    color:'#fff',
    background:color,
    border:'2px solid white',
    borderRadius:'999px',
    padding:'2px 6px',
    fontSize:'12px',
    fontWeight:'700',
    boxShadow:'0 2px 8px rgba(0,0,0,.2)'
  });
  map.addOverlay(label);
  const circle = new BMap.Circle(p, 60, {strokeColor:color, fillColor:color, fillOpacity:0.25, strokeWeight:2});
  map.addOverlay(circle);
  markerRegistry.set(key, {item, point:p, label, circle});
  label.addEventListener('click', function(){ openEntry(key); });
  circle.addEventListener('click', function(){ openEntry(key); });
}
map.setViewport(points, {margins:[60,60,60,60]});

document.querySelectorAll('.restaurant-btn').forEach(btn => {
  btn.addEventListener('click', () => focusRestaurant(btn.dataset.key, 15));
});
